<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flor Amarilla - Exacta</title>
    <style>
        body { margin: 0; background: black; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { filter: drop-shadow(0 0 8px #FFD700); }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 800; canvas.height = 800;
        const cx = 400, cy = 400;

        // Esta función dibuja el pétalo usando la matemática de la tortuga
        function drawPetal(r, angle) {
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(angle);
            
            // Lado 1 del pétalo
            ctx.beginPath();
            ctx.strokeStyle = "#FFD700";
            ctx.lineWidth = 1;
            for (let a = 0; a <= 90; a++) {
                let rad = a * Math.PI / 180;
                let x = r * Math.cos(rad) - r;
                let y = r * Math.sin(rad);
                ctx.lineTo(x, y);
            }
            ctx.stroke();

            // Lado 2 del pétalo (se cruza para formar la punta)
            ctx.beginPath();
            for (let a = 0; a <= 90; a++) {
                let rad = a * Math.PI / 180;
                let x = -r * Math.cos(rad) + r;
                let y = r * Math.sin(rad);
                ctx.lineTo(x, y);
            }
            ctx.stroke();
            ctx.restore();
        }

        async function animate() {
            // Dibujar pétalos (16 pétalos, 18 líneas cada uno)
            for (let i = 0; i < 16; i++) {
                for (let j = 0; j < 18; j++) {
                    let r = 150 - j * 6;
                    drawPetal(r, (i * Math.PI * 2) / 16);
                    // Velocidad para que se vea el "tejido"
                    if (j % 3 === 0) await new Promise(r => setTimeout(r, 10));
                }
                await new Promise(r => setTimeout(r, 40));
            }

            // Dibujar centro (Phyllotaxis exacta de Víctor)
            const phi = 137.508 * (Math.PI / 180);
            for (let n = 0; n < 200; n++) {
                let r = 4 * Math.sqrt(n);
                let theta = n * phi;
                ctx.beginPath();
                ctx.arc(cx + r * Math.cos(theta), cy + r * Math.sin(theta), 3.5, 0, 2 * Math.PI);
                ctx.fillStyle = "#4b2c20";
                ctx.fill();
                ctx.strokeStyle = "black";
                ctx.lineWidth = 0.5;
                ctx.stroke();
                if (n % 10 === 0) await new Promise(r => setTimeout(r, 10));
            }
        }

        animate();
    </script>
</body>
</html>
