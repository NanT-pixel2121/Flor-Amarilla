<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Girasol Mágico para OM ❤️</title>
    <style>
        body { margin: 0; background: black; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Segoe UI', Arial, sans-serif; }
        #canvas { filter: drop-shadow(0 0 12px #FFD700); z-index: 10; }
        #bgCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
    </style>
</head>
<body>
    <canvas id="bgCanvas"></canvas>
    <canvas id="canvas"></canvas>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const bgCanvas = document.getElementById('bgCanvas');
        const bgCtx = bgCanvas.getContext('2d');
        
        // Ajustar tamaño del fondo
        bgCanvas.width = window.innerWidth;
        bgCanvas.height = window.innerHeight;
        canvas.width = 800; canvas.height = 900;
        
        const cx = 400; const cy = 350; 

        // 1. SISTEMA DE PARTÍCULAS (Cascada)
        const particles = [];
        function initParticles() {
            for (let i = 0; i < 150; i++) {
                particles.push({
                    x: Math.random() * bgCanvas.width,
                    y: Math.random() * bgCanvas.height,
                    size: Math.random() * 2 + 1,
                    speed: Math.random() * 0.5 + 0.1, // Súper despacio
                    opacity: Math.random() * 0.8 + 0.2
                });
            }
        }

        function animateParticles() {
            bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
            bgCtx.fillStyle = "#FFD700"; // Partículas doradas
            particles.forEach(p => {
                p.y += p.speed;
                // Reiniciar arriba si cae del todo
                if (p.y > bgCanvas.height) { p.y = -10; p.x = Math.random() * bgCanvas.width; }
                
                bgCtx.globalAlpha = p.opacity;
                bgCtx.beginPath();
                bgCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                bgCtx.fill();
            });
            bgCtx.globalAlpha = 1;
            requestAnimationFrame(animateParticles); // Bucle infinito
        }

        // 2. FUNCIONES DE DIBUJO (Mismo código detallado)
        function drawPetal(r, angle) {
            ctx.save(); ctx.translate(cx, cy); ctx.rotate(angle); ctx.beginPath(); ctx.strokeStyle = "#FFD700"; ctx.lineWidth = 1.2; ctx.globalAlpha = 0.8;
            for (let a = 0; a <= 90; a++) { let rad = a * Math.PI / 180; let x = r * Math.cos(rad) - r; let y = r * Math.sin(rad); ctx.lineTo(x, y); } ctx.stroke();
            ctx.beginPath(); for (let a = 0; a <= 90; a++) { let rad = a * Math.PI / 180; let x = -r * Math.cos(rad) + r; let y = r * Math.sin(rad); ctx.lineTo(x, y); } ctx.stroke();
            ctx.restore();
        }

        async function drawDetailedStem() {
            ctx.strokeStyle = "#2E8B57"; ctx.lineWidth = 2; ctx.lineCap = "round";
            for (let h = 900; h >= cy + 10; h -= 3) { ctx.beginPath(); ctx.moveTo(cx, 900); ctx.lineTo(cx, h); ctx.stroke(); ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(cx-3, 900); ctx.lineTo(cx-3, h+5); ctx.stroke(); ctx.beginPath(); ctx.moveTo(cx+3, 900); ctx.lineTo(cx+3, h+5); ctx.stroke(); ctx.lineWidth = 2; await new Promise(r => setTimeout(r, 20)); }
            for (let j = 0; j < 50; j++) { ctx.save(); ctx.translate(cx - 40, cy + 180); ctx.rotate(-Math.PI/6); ctx.beginPath(); ctx.ellipse(0, 0, j, j/2.5, 0, 0, Math.PI*2); ctx.stroke(); ctx.lineWidth = 0.5; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-j+5, 0); ctx.stroke(); ctx.restore(); ctx.save(); ctx.translate(cx + 40, cy + 120); ctx.rotate(Math.PI/6); ctx.beginPath(); ctx.ellipse(0, 0, j, j/2.5, 0, 0, Math.PI*2); ctx.stroke(); ctx.lineWidth = 0.5; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(j-5, 0); ctx.stroke(); ctx.restore(); ctx.lineWidth = 2; await new Promise(r => setTimeout(r, 30)); }
        }

        async function animateFlower() {
            // -- FASE 1: TALLO DETALLADO --
            await drawDetailedStem();

            // -- FASE 2: PÉTALOS (Velocidad Pausada) --
            for (let i = 0; i < 16; i++) {
                for (let j = 0; j < 18; j++) {
                    let r = 150 - j * 6;
                    drawPetal(r, (i * Math.PI * 2) / 16);
                    await new Promise(r => setTimeout(r, 60)); 
                }
                await new Promise(r => setTimeout(r, 150));
            }

            // -- FASE 3: CENTRO MATEMÁTICO CON INICIALES --
            const phi = 137.508 * (Math.PI / 180);
            for (let n = 0; n < 230; n++) {
                let r = 4.8 * Math.sqrt(n);
                let theta = n * phi;
                ctx.beginPath(); ctx.arc(cx + r * Math.cos(theta), cy + r * Math.sin(theta), 4, 0, 2 * Math.PI); ctx.fillStyle = "#4b2c20"; ctx.fill(); ctx.strokeStyle = "black"; ctx.stroke();
                
                ctx.fillStyle = "#FFD700"; ctx.font = "bold 38px 'Segoe UI', Arial"; ctx.textAlign = "center"; ctx.shadowBlur = 15; ctx.shadowColor = "gold";
                if (n === 215) ctx.fillText("O", cx - 25, cy + 15);
                if (n === 225) ctx.fillText("M", cx + 5, cy + 15);
                if (n === 229) { ctx.font = "38px Arial"; ctx.fillText("❤️", cx + 45, cy + 15); }
                await new Promise(r => setTimeout(r, 60)); 
            }
        }

        // INICIAR TODO
        initParticles();
        animateParticles(); // Fondo infinito
        animateFlower(); // Flor animada

    </script>
</body>
</html>
